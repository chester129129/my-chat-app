<!DOCTYPE html>
<html>
<head>
  <title>채팅 프로그램 / Programa de chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 10px; background: #f0f0f0; }
    #login, #main { padding: 20px; }
    #login { background: #fff; border-radius: 10px; }
    #main { display: none; }
    .tab-buttons { margin-bottom: 10px; }
    .tab-buttons button { padding: 10px; margin-right: 5px; background: #ddd; border: none; border-radius: 5px; cursor: pointer; }
    .tab-buttons button:hover { background: #ccc; }
    .tab-content { display: none; background: #fff; padding: 10px; border-radius: 10px; }
    #chat-messages, #all-chat-messages { height: 300px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; }
    #chat-room { display: none; }
    .message { margin: 5px 0; display: flex; align-items: center; }
    .message img.profile-pic { width: 30px; height: 30px; border-radius: 50%; margin-right: 10px; }
    .message-media { max-width: 200px; max-height: 200px; }
    .timestamp { font-size: 0.8em; color: #888; margin-left: 10px; }
    #message, #all-message { width: 70%; padding: 5px; }
    button { padding: 5px 10px; margin: 5px; background: #007BFF; color: white; border: none; border-radius: 5px; cursor: pointer; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #emoji-picker, #emoji-picker-all { display: none; position: absolute; background: #fff; border: 1px solid #ddd; padding: 10px; transform: translateX(-50%); }
    #emoji-picker button, #emoji-picker-all button { font-size: 20px; margin: 5px; background: none; border: none; cursor: pointer; }
    .unread { background: #ffcccc; }
    #points { margin: 10px 0; font-weight: bold; }
  </style>
</head>
<body>
  <div id="login">
    <h2>로그인 / Iniciar sesión</h2>
    <input type="text" id="userId" placeholder="유저 ID / ID de usuario"><br>
    <input type="password" id="password" placeholder="비밀번호 / Contraseña"><br>
    <label><input type="checkbox" id="rememberMe"> 기억하기 / Recordarme</label><br>
    <button onclick="login()">로그인 / Iniciar sesión</button>
  </div>
  <div id="main">
    <div id="points">내 모네라 / Mis moneras: <span id="points-value">0</span></div>
    <div class="tab-buttons">
      <button onclick="showTab('chat')">채팅 / Chat</button>
      <button onclick="showTab('friends')">친구 / Amigos</button>
      <button onclick="showTab('users')">유저 / Usuarios</button>
      <button onclick="showTab('all-chat')">전체 채팅 / Chat general</button>
      <button onclick="showTab('quiz')">퀴즈 / Quiz</button>
      <button onclick="showTab('shop')">상점 / Tienda</button>
      <button onclick="showTab('settings')">설정 / Configuración</button>
    </div>
    <div id="chat" class="tab-content">
      <div id="room-list"></div>
      <div id="chat-room">
        <button onclick="backToRooms()">뒤로 / Volver</button>
        <div id="chat-messages"></div>
        <select id="color-select" onchange="applyColor()"></select>
        <input type="text" id="message" placeholder="메시지 입력 / Escribe un mensaje">
        <button onclick="sendMessage()">보내기 / Enviar</button>
        <button onclick="showEmojiPicker()">😊</button>
        <div id="emoji-picker"></div>
        <input type="file" id="fileInput">
        <button onclick="sendFile()">파일 보내기 / Enviar archivo</button>
        <button onclick="startRecording()">🎙️ 녹음 시작 / Iniciar grabación</button>
        <button onclick="stopRecording()" disabled>녹음 중지 / Detener grabación</button>
        <button onclick="clearRoom()">대화 지우기 / Borrar chat</button>
      </div>
    </div>
    <div id="friends" class="tab-content"></div>
    <div id="users" class="tab-content"></div>
    <div id="all-chat" class="tab-content">
      <div id="all-chat-messages"></div>
      <select id="all-color-select" onchange="applyAllColor()"></select>
      <input type="text" id="all-message" placeholder="전체 메시지 입력 / Escribe un mensaje general">
      <button onclick="sendAllMessage()">보내기 / Enviar</button>
      <button onclick="showEmojiPickerAll()">😊</button>
      <div id="emoji-picker-all"></div>
      <input type="file" id="all-fileInput">
      <button onclick="sendAllFile()">파일 보내기 / Enviar archivo</button>
      <button onclick="startAllRecording()">🎙️ 녹음 시작 / Iniciar grabación</button>
      <button onclick="stopAllRecording()" disabled>녹음 중지 / Detener grabación</button>
    </div>
    <div id="quiz" class="tab-content">
      <h3>오늘의 퀴즈 / Quiz del día</h3>
      <div id="quiz-list"></div>
    </div>
    <div id="shop" class="tab-content">
      <h3>상점 / Tienda</h3>
      <div id="shop-items"></div>
    </div>
    <div id="settings" class="tab-content">
      <div id="settings-list">
        <button onclick="showSettingsSubmenu('profile')">프로필 / Perfil</button>
        <button onclick="showSettingsSubmenu('sound')">소리 / Sonido</button>
        <button onclick="showSettingsSubmenu('credits')">제작진 / Créditos</button>
        <button onclick="showSettingsSubmenu('guide')">가이드 / Guía</button>
        <button onclick="showSettingsSubmenu('admin')">관리자 / Admin</button>
      </div>
      <div id="profile-settings" style="display:none;">
        <button onclick="backToSettings()">뒤로 / Volver</button>
        <div id="settings-profile"></div>
        <input type="file" id="profileInput">
        <button onclick="uploadProfile()">프로필 사진 변경 / Cambiar foto de perfil</button>
      </div>
      <div id="sound-settings" style="display:none;">
        <button onclick="backToSettings()">뒤로 / Volver</button>
        <button onclick="toggleSound()">소리 끄기/켜기 / Desactivar/Activar sonido</button>
        <button onclick="setSound('soft')">부드러운 소리 / Sonido suave</button>
        <button onclick="previewSound('soft')">미리듣기 / Preescuchar</button>
        <button onclick="setSound('bell')">벨 소리 / Sonido de campana</button>
        <button onclick="previewSound('bell')">미리듣기 / Preescuchar</button>
        <button onclick="setSound('chime')">차임 소리 / Sonido de carillón</button>
        <button onclick="previewSound('chime')">미리듣기 / Preescuchar</button>
      </div>
      <div id="credits-settings" style="display:none;">
        <button onclick="backToSettings()">뒤로 / Volver</button>
        <p>제작: 나 / Creado por: Yo</p>
      </div>
      <div id="guide-settings" style="display:none;">
        <button onclick="backToSettings()">뒤로 / Volver</button>
        <p>가이드는 아직 없어요 / La guía aún no está disponible</p>
      </div>
      <div id="admin-settings" style="display:none;">
        <button onclick="backToSettings()">뒤로 / Volver</button>
        <input type="password" id="admin-password" placeholder="관리자 비밀번호 / Contraseña de admin">
        <input type="number" id="admin-points" placeholder="포인트 / Puntos">
        <button onclick="adminGetPoints()">포인트 받기 / Obtener puntos</button>
      </div>
    </div>
  </div>
  <audio id="notification"></audio>
  <script>
    let myId, currentRoom, pollingInterval, allChatInterval, mediaRecorder, audioChunks = [], soundEnabled = true, token, lastMessageCount = 0, lastAllMessageCount = 0, items = {};

    window.onload = () => {
      const savedUserId = localStorage.getItem('savedUserId');
      const savedPassword = localStorage.getItem('savedPassword');
      if (savedUserId && savedPassword) {
        document.getElementById('userId').value = savedUserId;
        document.getElementById('password').value = savedPassword;
        document.getElementById('rememberMe').checked = true;
      }
    };

    async function login() {
      const password = document.getElementById('password').value;
      const userId = document.getElementById('userId').value;
      const rememberMe = document.getElementById('rememberMe').checked;
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password, userId })
      });
      const data = await res.json();
      if (data.success) {
        myId = userId;
        token = data.token;
        localStorage.setItem('token', token);
        if (rememberMe) {
          localStorage.setItem('savedUserId', userId);
          localStorage.setItem('savedPassword', password);
        } else {
          localStorage.removeItem('savedUserId');
          localStorage.removeItem('savedPassword');
        }
        document.getElementById('login').style.display = 'none';
        document.getElementById('main').style.display = 'block';
        updateUserList();
        updateSettingsProfile();
        loadSound();
        updatePoints();
        setInterval(updatePoints, 5000);
        window.onbeforeunload = logout;
      } else {
        alert('비밀번호가 틀렸어요! / ¡Contraseña incorrecta!');
      }
    }

    async function logout() {
      await fetch('/logout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ userId: myId })
      });
      localStorage.removeItem('token');
    }

    async function updateUserList() {
      const res = await fetch('/users', { headers: { 'Authorization': `Bearer ${token}` } });
      const users = await res.json();
      const usersDiv = document.getElementById('users');
      usersDiv.innerHTML = '';
      users.filter(user => user.userId !== myId).forEach(user => {
        const div = document.createElement('div');
        div.className = 'message';
        div.innerHTML = `<img src="${user.profilePic}" class="profile-pic"><span>${user.userId}</span>`;
        const addButton = document.createElement('button');
        addButton.innerText = '친구 추가 / Añadir amigo';
        addButton.onclick = () => addFriend(user.userId);
        div.appendChild(addButton);
        usersDiv.appendChild(div);
      });
      updateFriendsList();
    }

    async function addFriend(friendId) {
      const res = await fetch('/friends', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ userId: myId, friendId })
      });
      const data = await res.json();
      if (data.success) updateFriendsList();
      else if (data.message) alert(`${friendId}는 이미 친구야! / ¡${friendId} ya es amigo!`);
    }

    async function removeFriend(friendId) {
      const res = await fetch('/friends', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ userId: myId, friendId })
      });
      const data = await res.json();
      if (data.success) updateFriendsList();
    }

    async function updateFriendsList() {
      const resFriends = await fetch(`/friends/${myId}`, { headers: { 'Authorization': `Bearer ${token}` } });
      const friends = await resFriends.json();
      const resUsers = await fetch('/all-users', { headers: { 'Authorization': `Bearer ${token}` } });
      const allUsers = await resUsers.json();
      const friendsDiv = document.getElementById('friends');
      friendsDiv.innerHTML = '';
      friends.forEach(friend => {
        const friendData = allUsers.find(u => u.userId === friend);
        const profilePic = friendData ? friendData.profilePic : '/uploads/default-profile.png';
        const div = document.createElement('div');
        div.className = 'message';
        const chatButton = document.createElement('button');
        chatButton.innerText = friend;
        const roomId = [myId, friend].sort().join('-');
        chatButton.onclick = () => startChat(roomId);
        const removeButton = document.createElement('button');
        removeButton.innerText = '삭제 / Eliminar';
        removeButton.onclick = () => removeFriend(friend);
        const shareButton = document.createElement('button');
        shareButton.innerText = '모네라 주기 / Dar moneras';
        shareButton.onclick = () => sharePoints(friend);
        div.innerHTML = `<img src="${profilePic}" class="profile-pic">`;
        div.appendChild(chatButton);
        div.appendChild(removeButton);
        div.appendChild(shareButton);
        friendsDiv.appendChild(div);
      });
    }

    async function updateRoomList() {
      const resRooms = await fetch(`/rooms/${myId}`, { headers: { 'Authorization': `Bearer ${token}` } });
      const roomData = await resRooms.json();
      const resUsers = await fetch('/all-users', { headers: { 'Authorization': `Bearer ${token}` } });
      const allUsers = await resUsers.json();
      const roomList = document.getElementById('room-list');
      roomList.innerHTML = '';
      roomData.forEach(({ roomId, lastMessage, unreadCount }) => {
        const participants = roomId.split('-').filter(id => id !== '');
        const roomName = participants.filter(id => id !== myId).join(', ');
        const friendId = participants.find(id => id !== myId);
        const friendData = allUsers.find(u => u.userId === friendId);
        const profilePic = friendData ? friendData.profilePic : '/uploads/default-profile.png';
        const roomButton = document.createElement('button');
        roomButton.innerHTML = `<img src="${profilePic}" class="profile-pic">${roomName}와의 대화 / Chat con ${roomName}`;
        if (unreadCount > 0) roomButton.classList.add('unread');
        roomButton.onclick = () => startChat(roomId);
        const preview = document.createElement('div');
        preview.innerText = lastMessage ? lastMessage.message.split('\n')[0] : '대화 없음 / Sin mensajes';
        const div = document.createElement('div');
        div.className = 'message';
        div.appendChild(roomButton);
        div.appendChild(preview);
        roomList.appendChild(div);
      });
    }

    async function updateSettingsProfile() {
      const res = await fetch('/users', { headers: { 'Authorization': `Bearer ${token}` } });
      const users = await res.json();
      const me = users.find(u => u.userId === myId);
      const profileDiv = document.getElementById('settings-profile');
      if (me) profileDiv.innerHTML = `<img src="${me.profilePic}" class="profile-pic"><span>${myId}</span>`;
      else profileDiv.innerHTML = `<span>유저를 못 찾았어요: ${myId} / No se encontró el usuario: ${myId}</span>`;
    }

    async function startChat(roomId) {
      currentRoom = roomId;
      const tabs = document.getElementsByClassName('tab-content');
      for (let i = 0; i < tabs.length; i++) tabs[i].style.display = 'none';
      document.getElementById('chat').style.display = 'block';
      document.getElementById('room-list').style.display = 'none';
      document.getElementById('chat-room').style.display = 'block';
      loadChatHistory();
      loadColorOptions();
      if (pollingInterval) clearInterval(pollingInterval);
      pollingInterval = setInterval(loadChatHistory, 2000);
    }

    async function loadChatHistory() {
      if (!currentRoom) return;
      try {
        const res = await fetch(`/chat/${currentRoom}/${myId}`, { headers: { 'Authorization': `Bearer ${token}`, 'Cache-Control': 'no-cache' } });
        if (!res.ok) throw new Error(`서버 응답 실패: ${res.status}`);
        const messages = await res.json();
        const resUsers = await fetch('/all-users', { headers: { 'Authorization': `Bearer ${token}` } });
        const allUsers = await resUsers.json();
        const chat = document.getElementById('chat-messages');
        const messageCount = messages.length;
        if (messageCount > lastMessageCount && soundEnabled && messages[messages.length - 1].from !== myId) {
          const audio = document.getElementById('notification');
          audio.play().catch(err => console.log('알림 소리 재생 실패 / Error al reproducir sonido:', err));
        }
        lastMessageCount = messageCount;
        chat.innerHTML = '';
        messages.forEach(data => {
          const user = allUsers.find(u => u.userId === data.from);
          const profilePic = user ? user.profilePic : '/uploads/default-profile.png';
          const p = document.createElement('p');
          p.className = 'message';
          const timestamp = new Date(data.timestamp).toLocaleString('ko-KR');
          if (data.type === 'text') {
            p.innerHTML = `<img src="${profilePic}" class="profile-pic"><strong>${data.from}:</strong> ${data.message.replace(/\n/g, '<br>')} <span class="timestamp">${timestamp}</span>`;
          } else if (data.type === 'image') {
            p.innerHTML = `<img src="${profilePic}" class="profile-pic"><strong>${data.from}:</strong> <img src="${data.message}" class="message-media"> <span class="timestamp">${timestamp}</span>`;
          } else if (data.type === 'video') {
            p.innerHTML = `<img src="${profilePic}" class="profile-pic"><strong>${data.from}:</strong> <video src="${data.message}" controls class="message-media"></video> <span class="timestamp">${timestamp}</span>`;
          } else if (data.type === 'voice') {
            p.innerHTML = `<img src="${profilePic}" class="profile-pic"><strong>${data.from}:</strong> <audio src="${data.message}" controls onplay="pausePolling()" onended="resumePolling()"></audio> <span class="timestamp">${timestamp}</span>`;
          }
          chat.appendChild(p);
        });
        chat.scrollTop = chat.scrollHeight;
      } catch (error) {
        alert('채팅 기록을 불러오지 못했어요. 서버 상태를 확인해주세요. / No se pudo cargar el historial de chat.');
      }
    }

    async function loadAllChat() {
      const resMessages = await fetch('/all-chat', { headers: { 'Authorization': `Bearer ${token}` } });
      const messages = await resMessages.json();
      const resUsers = await fetch('/all-users', { headers: { 'Authorization': `Bearer ${token}` } });
      const allUsers = await resUsers.json();
      const chat = document.getElementById('all-chat-messages');
      const messageCount = messages.length;
      if (messageCount > lastAllMessageCount && soundEnabled && messages[messages.length - 1].from !== myId) {
        const audio = document.getElementById('notification');
        audio.play().catch(err => console.log('알림 소리 재생 실패 / Error al reproducir sonido:', err));
      }
      lastAllMessageCount = messageCount;
      chat.innerHTML = '';
      messages.forEach(data => {
        const user = allUsers.find(u => u.userId === data.from);
        const profilePic = user ? user.profilePic : '/uploads/default-profile.png';
        const p = document.createElement('p');
        p.className = 'message';
        const timestamp = new Date(data.timestamp).toLocaleString('ko-KR');
        if (data.type === 'text') {
          p.innerHTML = `<img src="${profilePic}" class="profile-pic"><strong>${data.from}:</strong> ${data.message.replace(/\n/g, '<br>')} <span class="timestamp">${timestamp}</span>`;
        } else if (data.type === 'image') {
          p.innerHTML = `<img src="${profilePic}" class="profile-pic"><strong>${data.from}:</strong> <img src="${data.message}" class="message-media"> <span class="timestamp">${timestamp}</span>`;
        } else if (data.type === 'video') {
          p.innerHTML = `<img src="${profilePic}" class="profile-pic"><strong>${data.from}:</strong> <video src="${data.message}" controls class="message-media"></video> <span class="timestamp">${timestamp}</span>`;
        } else if (data.type === 'voice') {
          p.innerHTML = `<img src="${profilePic}" class="profile-pic"><strong>${data.from}:</strong> <audio src="${data.message}" controls onplay="pausePolling()" onended="resumePolling()"></audio> <span class="timestamp">${timestamp}</span>`;
        }
        chat.appendChild(p);
      });
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const message = document.getElementById('message').value;
      if (!currentRoom || !message) return;
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ roomId: currentRoom, from: myId, message })
      });
      const data = await res.json();
      if (data.success) {
        document.getElementById('message').value = '';
        loadChatHistory();
      } else {
        alert(data.message || '메시지 전송 실패 / Error al enviar mensaje');
      }
    }

    async function sendAllMessage() {
      const message = document.getElementById('all-message').value;
      if (!message) return;
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ roomId: 'all-chat', from: myId, message })
      });
      const data = await res.json();
      if (data.success) {
        document.getElementById('all-message').value = '';
        loadAllChat();
      }
    }

    async function sendFile() {
      const fileInput = document.getElementById('fileInput');
      const file = fileInput.files[0];
      if (!currentRoom || !file) return;
      const formData = new FormData();
      formData.append('file', file);
      formData.append('roomId', currentRoom);
      formData.append('from', myId);
      const res = await fetch('/upload', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: formData });
      const data = await res.json();
      if (data.success) {
        fileInput.value = '';
        loadChatHistory();
      }
    }

    async function sendAllFile() {
      const fileInput = document.getElementById('all-fileInput');
      const file = fileInput.files[0];
      if (!file) return;
      const formData = new FormData();
      formData.append('file', file);
      formData.append('roomId', 'all-chat');
      formData.append('from', myId);
      const res = await fetch('/upload', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: formData });
      const data = await res.json();
      if (data.success) {
        fileInput.value = '';
        loadAllChat();
      }
    }

    async function uploadProfile() {
      const fileInput = document.getElementById('profileInput');
      const file = fileInput.files[0];
      if (!file) return;
      const formData = new FormData();
      formData.append('profile', file);
      formData.append('userId', myId);
      const res = await fetch('/upload/profile', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: formData });
      const data = await res.json();
      if (data.success) {
        alert('프로필 사진이 변경되었어요! / ¡Foto de perfil cambiada!');
        updateUserList();
        updateFriendsList();
        updateRoomList();
        updateSettingsProfile();
        loadChatHistory();
        loadAllChat();
      }
    }

    function showEmojiPicker() {
      const picker = document.getElementById('emoji-picker');
      picker.style.display = picker.style.display === 'block' ? 'none' : 'block';
      picker.innerHTML = '';
      const defaultEmojis = ['😊', '😂', '😍', '😢', '👍', '👎', '❤️', '🎉'];
      const purchasedEmojis = Object.keys(items).filter(id => items[id] === true && id.startsWith('emoji')).map(id => ({
        emoji1: '😊', emoji2: '😂'
      }[id]));
      const emojis = [...defaultEmojis, ...purchasedEmojis];
      emojis.forEach(emoji => {
        const btn = document.createElement('button');
        btn.innerText = emoji;
        btn.onclick = () => {
          document.getElementById('message').value += emoji;
          picker.style.display = 'none';
        };
        picker.appendChild(btn);
      });
      picker.style.left = '50%';
      picker.style.top = '80%';
    }

    function showEmojiPickerAll() {
      const picker = document.getElementById('emoji-picker-all');
      picker.style.display = picker.style.display === 'block' ? 'none' : 'block';
      picker.innerHTML = '';
      const defaultEmojis = ['😊', '😂', '😍', '😢', '👍', '👎', '❤️', '🎉'];
      const purchasedEmojis = Object.keys(items).filter(id => items[id] === true && id.startsWith('emoji')).map(id => ({
        emoji1: '😊', emoji2: '😂'
      }[id]));
      const emojis = [...defaultEmojis, ...purchasedEmojis];
      emojis.forEach(emoji => {
        const btn = document.createElement('button');
        btn.innerText = emoji;
        btn.onclick = () => {
          document.getElementById('all-message').value += emoji;
          picker.style.display = 'none';
        };
        picker.appendChild(btn);
      });
      picker.style.left = '50%';
      picker.style.top = '80%';
    }

    async function startRecording() {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = sendVoiceMessage;
      mediaRecorder.start();
      document.querySelector('button[onclick="startRecording()"]').disabled = true;
      document.querySelector('button[onclick="stopRecording()"]').disabled = false;
    }

    function stopRecording() {
      mediaRecorder.stop();
      mediaRecorder.stream.getTracks().forEach(track => track.stop());
      document.querySelector('button[onclick="startRecording()"]').disabled = false;
      document.querySelector('button[onclick="stopRecording()"]').disabled = true;
    }

    async function sendVoiceMessage() {
      const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
      const formData = new FormData();
      formData.append('voice', audioBlob, 'voice.wav');
      formData.append('roomId', currentRoom);
      formData.append('from', myId);
      const res = await fetch('/upload/voice', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: formData });
      const data = await res.json();
      if (data.success) loadChatHistory();
    }

    async function startAllRecording() {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = sendAllVoiceMessage;
      mediaRecorder.start();
      document.querySelector('button[onclick="startAllRecording()"]').disabled = true;
      document.querySelector('button[onclick="stopAllRecording()"]').disabled = false;
    }

    function stopAllRecording() {
      mediaRecorder.stop();
      mediaRecorder.stream.getTracks().forEach(track => track.stop());
      document.querySelector('button[onclick="startAllRecording()"]').disabled = false;
      document.querySelector('button[onclick="stopAllRecording()"]').disabled = true;
    }

    async function sendAllVoiceMessage() {
      const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
      const formData = new FormData();
      formData.append('voice', audioBlob, 'voice.wav');
      formData.append('roomId', 'all-chat');
      formData.append('from', myId);
      const res = await fetch('/upload/voice', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: formData });
      const data = await res.json();
      if (data.success) loadAllChat();
    }

    async function clearRoom() {
      if (!currentRoom || !confirm('대화 기록을 지울까요? / ¿Borrar historial de chat?')) return;
      if (pollingInterval) clearInterval(pollingInterval);
      const res = await fetch(`/chat/delete/${currentRoom}/${myId}`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
      const data = await res.json();
      if (data.success) {
        await loadChatHistory();
        pollingInterval = setInterval(loadChatHistory, 2000);
      } else {
        alert(data.message || '대화 지우기 실패 / No se pudo borrar el chat');
        pollingInterval = setInterval(loadChatHistory, 2000);
      }
    }

    function showTab(tabName) {
      const tabs = document.getElementsByClassName('tab-content');
      for (let i = 0; i < tabs.length; i++) tabs[i].style.display = 'none';
      document.getElementById(tabName).style.display = 'block';
      if (tabName === 'chat') {
        document.getElementById('room-list').style.display = 'block';
        document.getElementById('chat-room').style.display = 'none';
        updateRoomList();
        if (pollingInterval) clearInterval(pollingInterval);
      } else if (tabName === 'friends') {
        updateFriendsList();
      } else if (tabName === 'users') {
        updateUserList();
      } else if (tabName === 'all-chat') {
        loadAllChat();
        loadColorOptions();
        if (allChatInterval) clearInterval(allChatInterval);
        allChatInterval = setInterval(loadAllChat, 2000);
      } else if (tabName === 'quiz') {
        loadQuiz();
      } else if (tabName === 'shop') {
        loadShop();
      } else if (tabName === 'settings') {
        document.getElementById('settings-list').style.display = 'block';
        document.getElementById('profile-settings').style.display = 'none';
        document.getElementById('sound-settings').style.display = 'none';
        document.getElementById('credits-settings').style.display = 'none';
        document.getElementById('guide-settings').style.display = 'none';
        document.getElementById('admin-settings').style.display = 'none';
      }
    }

    function backToRooms() {
      document.getElementById('chat-room').style.display = 'none';
      document.getElementById('room-list').style.display = 'block';
      currentRoom = null;
      if (pollingInterval) clearInterval(pollingInterval);
      updateRoomList();
    }

    function showSettingsSubmenu(submenu) {
      document.getElementById('settings-list').style.display = 'none';
      document.getElementById(`${submenu}-settings`).style.display = 'block';
    }

    function backToSettings() {
      document.getElementById('settings-list').style.display = 'block';
      document.getElementById('profile-settings').style.display = 'none';
      document.getElementById('sound-settings').style.display = 'none';
      document.getElementById('credits-settings').style.display = 'none';
      document.getElementById('guide-settings').style.display = 'none';
      document.getElementById('admin-settings').style.display = 'none';
    }

    function toggleSound() {
      soundEnabled = !soundEnabled;
      alert(`소리가 ${soundEnabled ? '켜졌어요 / ¡Sonido activado!' : '꺼졌어요 / ¡Sonido desactivado!'}`);
    }

    function loadSound() {
      const sound = localStorage.getItem('notificationSound') || 'soft';
      const audio = document.getElementById('notification');
      if (sound === 'soft') audio.src = 'https://cdn.pixabay.com/audio/2024/11/29/audio_0b4f12f995.mp3';
      else if (sound === 'bell') audio.src = 'https://www.myinstants.com/media/sounds/bell.mp3';
      else if (sound === 'chime') audio.src = 'https://cdn.pixabay.com/audio/2024/11/29/audio_538916a9ed.mp3';
    }

    function setSound(type) {
      localStorage.setItem('notificationSound', type);
      loadSound();
      alert(`소리가 ${type}로 변경되었어요! / ¡Sonido cambiado a ${type}!`);
    }

    function previewSound(type) {
      const audio = document.getElementById('notification');
      if (type === 'soft') audio.src = 'https://cdn.pixabay.com/audio/2024/11/29/audio_0b4f12f995.mp3';
      else if (type === 'bell') audio.src = 'https://www.myinstants.com/media/sounds/bell.mp3';
      else if (type === 'chime') audio.src = 'https://cdn.pixabay.com/audio/2024/11/29/audio_538916a9ed.mp3';
      audio.play().catch(err => console.log('미리듣기 소리 재생 실패:', err));
    }

    function pausePolling() {
      if (pollingInterval) clearInterval(pollingInterval);
      if (allChatInterval) clearInterval(allChatInterval);
    }

    function resumePolling() {
      if (currentRoom) pollingInterval = setInterval(loadChatHistory, 2000);
      if (document.getElementById('all-chat').style.display === 'block') allChatInterval = setInterval(loadAllChat, 2000);
    }

    async function updatePoints() {
      const res = await fetch('/users', { headers: { 'Authorization': `Bearer ${token}` } });
      const users = await res.json();
      const me = users.find(u => u.userId === myId);
      document.getElementById('points-value').innerText = me ? (me.points || 0) : 0;
      items = me ? me.items || {} : {};
    }

    async function loadQuiz() {
      const res = await fetch('/quiz', { headers: { 'Authorization': `Bearer ${token}` } });
      const quizzes = await res.json();
      const quizList = document.getElementById('quiz-list');
      quizList.innerHTML = '';
      if (!quizzes || quizzes.length === 0) {
        quizList.innerHTML = '<p>오늘의 퀴즈가 없습니다. / No hay quizzes para hoy.</p>';
        return;
      }
      quizzes.forEach(q => {
        if (q.emoji && q.id) {
          const div = document.createElement('div');
          div.innerHTML = `<p>${q.emoji}</p><input type="text" id="answer-${q.id}"><button onclick="submitAnswer(${q.id})">제출 / Enviar</button>`;
          quizList.appendChild(div);
        }
      });
    }

    async function submitAnswer(quizId) {
      const answer = document.getElementById(`answer-${quizId}`).value;
      const res = await fetch('/quiz/attempt', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ quizId, answer })
      });
      const data = await res.json();
      if (data.success) {
        alert(data.correct ? '정답! 10 모네라 받았어요! / ¡Correcto! ¡Recibiste 10 moneras!' : '오답! / ¡Incorrecto!');
        loadQuiz();
        updatePoints();
      }
    }

    async function loadShop() {
      const res = await fetch('/shop', { headers: { 'Authorization': `Bearer ${token}` } });
      const shopItems = await res.json();
      const shopDiv = document.getElementById('shop-items');
      shopDiv.innerHTML = '';
      shopItems.forEach(item => {
        const div = document.createElement('div');
        div.innerHTML = `<p>${item.name} - ${item.price} 모네라 / Moneras</p><button onclick="purchaseItem('${item.id}')">구매 / Comprar</button>`;
        shopDiv.appendChild(div);
      });
    }

    async function purchaseItem(itemId) {
      const res = await fetch('/shop/purchase', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ itemId })
      });
      const data = await res.json();
      if (data.success) {
        alert('구매 성공! / ¡Compra exitosa!');
        updatePoints();
        loadShop();
        loadColorOptions();
      } else {
        alert(data.message || '구매 실패 / Compra fallida');
      }
    }

    async function sharePoints(friendId) {
      const points = parseInt(prompt('몇 모네라를 줄까요? / ¿Cuántas moneras quieres dar?'));
      if (!points || points <= 0) return;
      const res = await fetch('/share-points', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ toUserId: friendId, points })
      });
      const data = await res.json();
      if (data.success) {
        alert('모네라를 보냈어요! / ¡Moneras enviadas!');
        updatePoints();
      } else {
        alert(data.message || '모네라 보내기 실패 / Fallo al enviar moneras');
      }
    }

    async function adminGetPoints() {
      const password = document.getElementById('admin-password').value;
      const points = parseInt(document.getElementById('admin-points').value);
      const res = await fetch('/admin/points', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ password, points })
      });
      const data = await res.json();
      if (data.success) {
        alert('모네라 받기 성공! / ¡Moneras obtenidas con éxito!');
        updatePoints();
      } else {
        alert(data.message || '모네라 받기 실패 / Fallo al obtener moneras');
      }
    }

    async function loadColorOptions() {
      const select = document.getElementById('color-select');
      const allSelect = document.getElementById('all-color-select');
      select.innerHTML = '<option value="black">검정 / Negro</option>';
      allSelect.innerHTML = '<option value="black">검정 / Negro</option>';
      const now = Date.now();
      Object.keys(items).filter(id => id.startsWith('color') && (items[id].expires || 0) > now).forEach(id => {
        const color = id === 'color1' ? 'blue' : 'black';
        const option = document.createElement('option');
        option.value = color;
        option.innerText = id === 'color1' ? '파랑 / Azul' : '검정 / Negro';
        select.appendChild(option.cloneNode(true));
        allSelect.appendChild(option);
      });
    }

    function applyColor() {
      const color = document.getElementById('color-select').value;
      document.getElementById('chat-messages').style.color = color;
    }

    function applyAllColor() {
      const color = document.getElementById('all-color-select').value;
      document.getElementById('all-chat-messages').style.color = color;
    }
  </script>
</body>
</html>
